<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Savi | Menu</title>
  <meta name="description" content="La Savi full menu with zoom modal and steak cut illustrations.">
  <link rel="icon" href="../logo-la-savi.webp" type="image/webp">
  <style>
    :root{--bg:#000;--gold:#d4af37;--txt:#fff;--muted:#ccc;--panel:#1a1a1a;--border:#333;--serif:Georgia,"Times New Roman",Times,serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;--h:72px}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:var(--sans);background:var(--bg);color:var(--txt)} a{text-decoration:none;color:inherit}
    .container{width:min(1180px,calc(100% - 40px));margin:0 auto}
    header{position:sticky;top:0;z-index:50;height:var(--h);background:rgba(0,0,0,.94);border-bottom:1px solid rgba(212,175,55,.35)}
    .head{height:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}.brand img{width:42px;height:42px}.brand span{font-family:var(--serif);letter-spacing:.2em;text-transform:uppercase}
    nav{display:flex;gap:10px} nav a{padding:9px 12px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;border-radius:4px} nav a:hover{color:var(--gold);background:rgba(212,175,55,.08)}
    .switch{display:inline-flex;gap:6px}.switch a{padding:8px 10px;border:1px solid #555;border-radius:4px;background:#1a1a1a;color:#aaa;font-size:12px;font-weight:700}.switch a.active{background:var(--gold);color:#111;border-color:var(--gold)}
    main{padding:44px 0 78px}
    .title{text-align:center;font-family:var(--serif);text-transform:uppercase;letter-spacing:.08em;font-size:clamp(2rem,5vw,3.4rem)}
    .sub{text-align:center;color:var(--muted);margin-top:10px}
    .print{text-align:center;margin:22px 0}
    .print button{padding:10px 14px;border:1px solid rgba(212,175,55,.6);border-radius:8px;background:rgba(212,175,55,.08);color:#f3d989;font-weight:700;cursor:pointer}
    .cat{margin-top:30px}
    .cat h2{font-family:var(--serif);color:#f3d989;text-transform:uppercase;letter-spacing:.12em;font-size:18px;margin-bottom:10px}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
    .menu-card{display:flex;gap:18px;padding:18px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--gold);cursor:pointer;transition:all .28s ease;border-radius:4px}
    .menu-card:hover{background:#242424;border-left-color:#fff;transform:translateX(4px)}
    .menu-card-image{width:120px;height:120px;flex-shrink:0;background:#0a0a0a;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .menu-card-image img{width:100%;height:100%;object-fit:cover}
    .menu-card-info{display:flex;flex-direction:column;justify-content:space-between;flex:1}
    .item-name{font-size:14px;font-weight:700;color:#fff}
    .item-description{font-size:12px;color:#999;margin-top:5px;line-height:1.5}
    .item-price{font-size:14px;font-weight:700;color:var(--gold);margin-top:8px}
    .modal{display:none;position:fixed;inset:0;z-index:1000;animation:fadeIn .3s ease}
    .modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.72)}
    .modal-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(92vw,760px);max-height:90vh;overflow:auto;background:#000;border-top:3px solid var(--gold);border-radius:6px;padding:26px;animation:slideIn .3s ease}
    .modal-close{position:absolute;top:10px;right:12px;background:transparent;border:0;color:var(--gold);font-size:30px;cursor:pointer}
    .modal-close:hover{color:#fff}
    .modal-image-container{margin-bottom:16px;text-align:center}
    .modal-image-container img,.modal-image-container svg{width:100%;max-width:600px;height:auto;max-height:500px;border-radius:4px;background:#111}
    .modal-title{font-size:22px;color:#fff;margin-bottom:8px}
    .modal-description{font-size:14px;color:#ccc;line-height:1.6;margin-bottom:10px}
    .modal-details{font-size:13px;color:var(--gold);margin-bottom:16px}
    .modal-actions{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .modal-price{font-size:18px;font-weight:700;color:var(--gold)}
    .close-btn{padding:10px 20px;background:var(--gold);color:#000;border:0;cursor:pointer;font-weight:700}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}} @keyframes slideIn{from{transform:translate(-50%,-58%);opacity:0}to{transform:translate(-50%,-50%);opacity:1}}
    footer{border-top:1px solid rgba(212,175,55,.3);background:#0d0d0d;padding:32px 0 22px;margin-top:40px}
    .f{display:grid;grid-template-columns:repeat(3,1fr);gap:22px} footer h4{color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-size:12px;margin-bottom:8px} footer p,footer a{color:#8a8a8a;font-size:14px;line-height:1.7}
    .copy{text-align:center;color:#8a8a8a;font-size:13px;margin-top:12px}
    @media(max-width:900px){nav{display:none}.cards,.f{grid-template-columns:1fr}}
    @media(max-width:600px){.menu-card{flex-direction:column}.menu-card-image{width:100%;height:200px}}
    @media print{@page{size:A4;margin:10mm} #dish-modal,header,footer,.print{display:none!important}.menu-card-image{display:none!important}.menu-card{border:1px solid #000;page-break-inside:avoid} body{background:#fff!important}}
  </style>
</head>
<body>
  <header><div class="container head">
    <a class="brand" href="./index.html"><img src="../logo-la-savi.webp" alt="La Savi"><span>La Savi</span></a>
    <nav><a href="./index.html">Home</a><a href="./menu.html">Menu</a><a href="./index.html#reservation">Reservation</a><a href="./index.html#about">About Us</a><a href="./index.html#contact">Contact</a></nav>
    <div class="switch"><a href="/de/">🇩🇪 DE</a><a class="active" href="/en/">🇬🇧 EN</a></div>
  </div></header>

  <main><div class="container">

  <div id="dish-modal" class="modal">

    </div>
  </div>

  <footer><div class="container"><div class="f"><div><h4>Contact</h4><p>La Savi Steakhouse<br>Untermauerstraße 4<br>47051 Duisburg</p></div><div><h4>Opening Hours</h4><p>Mon–Sat: 12:00–22:00<br>Sunday: Closed</p></div><div><h4>Social</h4><p><a href="https://www.instagram.com/lasavi_restaurant/" target="_blank" rel="noopener noreferrer">Instagram</a> · <a href="https://www.tiktok.com/@lasavirestaurant?is_from_webapp=1&sender_device=pc" target="_blank" rel="noopener noreferrer">TikTok</a></p></div></div><p class="copy">© 2026 La Savi | Premium Steakhouse Duisburg</p></div></footer>

      {cat:"DAILY DOUGH DISHES (HOMEMADE)",items:[["06. Turkish Tortellini","€9,90","Filled with minced meat, butter and yogurt sauce",""],["07. Dough ship with kebab meat (or minced meat)","€9,90","Homemade pide with kebab/minced meat",""],["08. Dough ship with Lamb cubes and Gouda cheese","€9,90","Pide with lamb cubes and gouda",""],["09. Turkish pizza without everything","€3,90","Plain Turkish pizza",""],["10. Turkish pizza with salad","€5,90","Turkish pizza with salad",""],["11. Turkish pizza with kebab meat","€9,90","Turkish pizza with kebab meat",""],["12. Dough ship with Vegetables","€9,90","Vegetable pide",""]]},
      {cat:"DAILY DISHES (CLAY POT DISHES FROM THE OVEN)",items:[["MENU 1: Lamb meat clay pot with rice","€14,90","Traditional lamb clay pot with rice",""],["MENU 2: Chicken clay pot with rice","€12,90","Chicken clay pot with rice",""],["MENU 3: Lamb meatballs clay pot with rice","€13,90","Lamb meatballs clay pot with rice",""],["MENU 4: Shrimp clay pot with rice","€19,90","Shrimp clay pot with rice",""],["MENU 5: Vegetable clay pot with rice","€10,90","Vegetable clay pot with rice",""]]},

      {cat:"STEAK SPECIALTIES - Dry Aged (3-4 weeks)",items:[["33. Rump Steak (approx. 350 gr)","€34,90","Premium beef, dry aged 3-4 weeks, tender flavor","dry-rump"],["34. Filet Steak (approx. 300 gr)","€39,90","The most tender cut, perfectly matured","dry-filet"],["35. Cowboy Steak (approx. 1000 gr)","€49,90","Full-bodied and marbled","dry-cowboy"],["36. T-Bone Steak (approx. 1000 gr)","€49,90","Best of both sides in one cut","dry-tbone"]]},
      {cat:"STEAK SPECIALTIES - Buffalo",items:[["37. Buffalo Filet Steak (approx. 250gr)","€44,90","BUFFALO - Leaner, more intense","buf-filet"],["38. Buffalo Ribeye Steak (approx. 300gr)","€44,90","BUFFALO RIBEYE - Full aroma","buf-ribeye"]]},
      {cat:"STEAK SPECIALTIES - Wagyu",items:[["39. Wagyu Filet (approx. 200gr)","€129,00","WAGYU FILET - Meltingly tender","wag-filet"],["40. Wagyu Roastbeef (approx. 300gr)","€149,00","WAGYU ROASTBEEF - Delicate aroma","wag-roast"],["41. Wagyu Ribeye (approx. 300gr)","€149,00","WAGYU RIBEYE - Premium marbling","wag-ribeye"]]},
      {cat:"SIDE DISHES & SAUCES (for Steaks)",items:[["Cream spinach","€4,90","Cream spinach",""],["Fried potatoes with rosemary","€4,90","Rosemary fried potatoes",""],["Sweet potato fries","€4,90","Sweet potato fries",""],["Hollandaise sauce","€4,90","Hollandaise sauce",""],["Béarnaise sauce","€4,90","Béarnaise sauce",""],["Pepper sauce","€4,90","Pepper sauce",""]]},
      {cat:"COLD DRINKS",items:[["Coca Cola, Fanta, Sprite, Mezzo Mix (0.33l)","€2,90","Soft drink selection",""],["Uludağ (Turkish soda) (0.33l)","€2,90","Turkish soda",""],["Mineral water with or without carbonation (0.25l)","€2,50","Mineral water",""],["Mineral water with or without carbonation (0.75l)","€4,90","Large mineral water",""],["Orange-Cherry-Banana-Multi juice (0.2l)","€2,50","Mixed fruit juice",""],["Ayran (homemade Turkish buttermilk) (0.33l)","€1,90","Homemade ayran",""],["Ice tea (Peach, Lemon) (0.33l)","€2,90","Iced tea",""],["Ginger Ale (0.2l)","€2,90","Ginger Ale",""],["Bitter Lemon (0.2l)","€2,90","Bitter Lemon",""],["Red Bull (0.25l)","€2,50","Red Bull",""],["Malt beer (0.33l)","€2,90","Malt beer",""],["Krombacher (non-alcoholic beer) (0.33l)","€2,90","Non-alcoholic beer",""]]},
      {cat:"WINE & SPARKLING WINE (Natureo Non-Alcoholic)",items:[["Red wine Natureo (0.2l)","€7,90","Red wine",""],["White wine Natureo (0.2l)","€7,90","White wine",""],["Sparkling wine Natureo Seco (0.2l)","€7,90","Sparkling wine",""]]},
      {cat:"HOT DRINKS",items:[["Cafe Crema","€2,50","Cafe Crema",""],["Espresso","€2,50","Espresso",""],["Cappuccino","€2,90","Cappuccino",""],["Latte","€2,90","Latte",""],["Milk coffee","€2,90","Milk coffee",""],["Turkish Coffee","€2,50","Turkish Coffee",""],["Hot Cocoa","€2,90","Hot Cocoa",""]]},
      {cat:"DESSERTS",items:[["42. Katmer (crisp flaky pastry with Cream and pistachios)","€7,90","Crisp flaky pastry with cream and pistachios",""],["43. Künefe (String dough with cheese)","€7,90","String dough with cheese",""],["44. Rice pudding vanilla","€4,90","Vanilla rice pudding",""],["45. Mascarpone","€1,00","Mascarpone",""],["46. Maras Ice Cream","€2,90","Maras Ice Cream",""]]}
    ];

    function cowSvg(label, x, y, w, h, note) {
      return '<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg"><rect width="500" height="400" fill="#1a1a1a"/><g stroke="#ccc" stroke-width="2" fill="none"><ellipse cx="240" cy="190" rx="170" ry="90"/><circle cx="80" cy="180" r="38"/><path d="M48 165l-18 -8M50 196l-18 8"/><path d="M150 270v55M220 280v45M285 280v45M355 270v55"/><path d="M410 170l36 -20"/></g><rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="#d4af37" opacity=".28" stroke="#d4af37" stroke-width="2.5"/><text x="'+(x+4)+'" y="'+(y-8)+'" fill="#d4af37" font-size="16" font-weight="700">'+label+'</text><text x="26" y="360" fill="#d4af37" font-size="16">'+note+'</text></svg>';
    }
    var steakSvg = {
      "dry-rump": cowSvg("RUMP",260,150,80,56,"RUMP - The tender classic"),
      "dry-filet": cowSvg("FILET",205,170,70,40,"FILET - The most tender cut"),
      "dry-cowboy": cowSvg("RIB",160,130,80,56,"COWBOY - Rich & marbled"),
      "dry-tbone": cowSvg("T-BONE",210,140,70,70,"T-BONE - Best of both sides"),
      "buf-filet": cowSvg("FILET",205,170,70,40,"BUFFALO - Leaner, intense"),
      "buf-ribeye": cowSvg("RIBEYE",165,130,84,56,"BUFFALO RIBEYE - Full aroma"),
      "wag-filet": cowSvg("FILET",205,170,70,40,"WAGYU FILET - Meltingly tender"),
      "wag-roast": cowSvg("ROASTBEEF",250,140,84,56,"WAGYU ROASTBEEF - Delicate aroma"),
      "wag-ribeye": cowSvg("RIBEYE",165,130,84,56,"WAGYU RIBEYE - Premium marbling")
    };

    function placeholderImg() { return '<img src="../logo-la-savi.webp" alt="La Savi placeholder">'; }
    function makeCard(item) {
      var n=item[0],p=item[1],d=item[2],k=item[3]||"";
      return '<article class="menu-card" onclick="openModal(this)"><div class="menu-card-image">'+placeholderImg()+'</div><div class="menu-card-info"><div><div class="item-name">'+n+'</div><div class="item-description">'+d+'</div></div><div class="item-price">'+p+'</div></div><div class="modal-data" style="display:none" data-key="'+k+'" data-name="'+n+'" data-desc="'+d+'" data-price="'+p+'"></div></article>';
    }
    document.getElementById("menu-root").innerHTML = menuData.map(function(c){return '<section class="cat"><h2>'+c.cat+'</h2><div class="cards">'+c.items.map(makeCard).join("")+'</div></section>';}).join("");

    function openModal(card){
      var data=card.querySelector(".modal-data");
      var key=data.dataset.key, title=data.dataset.name, desc=data.dataset.desc, price=data.dataset.price;
      var wrap=document.getElementById("modal-image-wrap");
      if(key && steakSvg[key]) wrap.innerHTML = steakSvg[key]; else wrap.innerHTML = '<img src="../logo-la-savi.webp" alt="'+title+'">';
      document.getElementById("modal-title").textContent = title;
      document.getElementById("modal-description").textContent = desc;
      document.getElementById("modal-details").textContent = key ? "Steak-cut illustration" : "La Savi placeholder image";
      document.getElementById("modal-price").textContent = price;
      document.getElementById("dish-modal").style.display="block";
      document.body.style.overflow="hidden";
    }
    function closeModal(){ document.getElementById("dish-modal").style.display="none"; document.body.style.overflow="auto"; }
    document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeModal(); });
    window.openModal=openModal; window.closeModal=closeModal;
  </script>
</body>
</html>
